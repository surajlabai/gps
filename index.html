<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPortal - Student & Admin</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts - Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #1a1a2e;
            color: #fff;
            overflow-x: hidden;
        }

        /* ===== PREMIUM NAVBAR ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #00d4ff;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            transform: translateY(-100%);
            animation: slideDown 0.8s ease forwards;
        }

        @keyframes slideDown {
            to { transform: translateY(0); }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo i {
            font-size: 2.5rem;
            color: #00d4ff;
            filter: drop-shadow(0 0 10px #00d4ff);
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 10px #00d4ff); }
            50% { filter: drop-shadow(0 0 20px #00d4ff); }
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, #fff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            position: relative;
            padding: 5px 0;
            transition: 0.3s;
            cursor: pointer;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: #00d4ff;
            transition: 0.3s;
            box-shadow: 0 0 10px #00d4ff;
        }

        .nav-links a:hover::before {
            width: 100%;
        }

        .nav-links a:hover {
            color: #00d4ff;
        }

        .nav-links .premium-btn {
            border: 2px solid #00d4ff;
            padding: 8px 20px;
            border-radius: 40px;
            background: transparent;
            transition: 0.3s;
        }

        .nav-links .premium-btn:hover {
            background: #00d4ff;
            color: #1a1a2e;
            box-shadow: 0 0 20px #00d4ff;
        }

        /* ===== MAIN CONTAINER ===== */
        .main-container {
            margin-top: 100px;
            padding: 30px 50px;
        }

        /* ===== ADMIN PANEL ===== */
        .admin-panel {
            background: rgba(255,255,255,0.05);
            border: 2px solid #00d4ff;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .admin-header h2 {
            font-size: 2rem;
            background: linear-gradient(45deg, #fff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .admin-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .admin-tab {
            padding: 10px 20px;
            border: 2px solid #00d4ff;
            border-radius: 30px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
        }

        .admin-tab.active {
            background: #00d4ff;
            color: #1a1a2e;
        }

        .admin-tab:hover {
            background: #00d4ff;
            color: #1a1a2e;
        }

        .admin-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .admin-input-group {
            position: relative;
        }

        .admin-input-group input,
        .admin-input-group select,
        .admin-input-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 2px solid #00d4ff;
            border-radius: 10px;
            color: #fff;
            outline: none;
            font-size: 16px;
        }

        .admin-input-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .admin-input-group input::placeholder,
        .admin-input-group textarea::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .admin-btn {
            padding: 12px 30px;
            border: 2px solid #00d4ff;
            border-radius: 30px;
            background: transparent;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .admin-btn:hover {
            background: #00d4ff;
            color: #1a1a2e;
            box-shadow: 0 0 20px #00d4ff;
        }

        .admin-btn.delete {
            border-color: #ff4444;
        }

        .admin-btn.delete:hover {
            background: #ff4444;
            color: #fff;
        }

        .admin-list {
            margin-top: 30px;
        }

        .admin-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid #00d4ff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .admin-item-info h4 {
            color: #00d4ff;
            margin-bottom: 5px;
        }

        .admin-item-info p {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        .admin-item-actions {
            display: flex;
            gap: 10px;
        }

        .admin-item-actions button {
            padding: 5px 15px;
            border: 1px solid #00d4ff;
            border-radius: 20px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
        }

        .admin-item-actions button.edit:hover {
            background: #00d4ff;
            color: #1a1a2e;
        }

        .admin-item-actions button.delete:hover {
            background: #ff4444;
            border-color: #ff4444;
        }

        /* ===== CONTENT BOXES ===== */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin: 30px 0;
        }

        .content-box {
            background: rgba(255,255,255,0.05);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .content-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,212,255,0.2), transparent);
            transition: 0.6s;
        }

        .content-box:hover::before {
            left: 100%;
        }

        .content-box:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 40px rgba(0,212,255,0.4);
        }

        .content-box i {
            font-size: 3rem;
            color: #00d4ff;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px #00d4ff);
        }

        .content-box h3 {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 10px;
        }

        .content-box p {
            color: #00d4ff;
            margin-bottom: 15px;
        }

        .content-count {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #00d4ff;
            color: #1a1a2e;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            box-shadow: 0 0 20px #00d4ff;
        }

        /* ===== BREADCRUMB ===== */
        .breadcrumb {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #00d4ff;
            border-radius: 40px;
        }

        .breadcrumb-item {
            color: #fff;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .breadcrumb-item:hover {
            color: #00d4ff;
            background: rgba(0,212,255,0.1);
        }

        .breadcrumb-item.active {
            color: #00d4ff;
            font-weight: 600;
        }

        .breadcrumb-separator {
            color: #00d4ff;
        }

        /* ===== CONTENT VIEWER ===== */
        .content-viewer {
            background: rgba(255,255,255,0.05);
            border: 2px solid #00d4ff;
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            backdrop-filter: blur(10px);
        }

        .content-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .content-tab {
            padding: 12px 30px;
            border: 2px solid #00d4ff;
            border-radius: 40px;
            background: transparent;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .content-tab.active {
            background: #00d4ff;
            color: #1a1a2e;
        }

        .content-tab:hover {
            background: #00d4ff;
            color: #1a1a2e;
        }

        .content-display {
            min-height: 300px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 10px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .notes-content {
            white-space: pre-wrap;
            line-height: 1.8;
            color: #fff;
        }

        .questions-list {
            list-style: none;
        }

        .questions-list li {
            padding: 15px;
            border-bottom: 1px solid #00d4ff;
            color: #fff;
        }

        .questions-list li:last-child {
            border-bottom: none;
        }

        /* ===== LOADING ===== */
        .loader {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 40px 0;
        }

        .loader-circle {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #00d4ff;
            animation: loader 1s ease-in-out infinite;
            box-shadow: 0 0 20px #00d4ff;
        }

        .loader-circle:nth-child(2) { animation-delay: 0.2s; }
        .loader-circle:nth-child(3) { animation-delay: 0.4s; }

        @keyframes loader {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.5); opacity: 1; }
        }

        /* ===== ACCESS CONTROL ===== */
        .access-message {
            text-align: center;
            padding: 100px 20px;
            background: rgba(255,255,255,0.05);
            border: 2px solid #00d4ff;
            border-radius: 20px;
            margin: 50px auto;
            max-width: 500px;
        }

        .access-message i {
            font-size: 5rem;
            color: #00d4ff;
            margin-bottom: 20px;
        }

        .access-message h2 {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .access-message p {
            color: #00d4ff;
            margin-bottom: 30px;
        }

        .access-btn {
            padding: 15px 40px;
            border: 2px solid #00d4ff;
            border-radius: 40px;
            background: transparent;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .access-btn:hover {
            background: #00d4ff;
            color: #1a1a2e;
            box-shadow: 0 0 30px #00d4ff;
        }

        /* ===== HIDDEN CLASS ===== */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-graduation-cap"></i>
            <div>
                <h1>Suraj Ai EduPortal</h1>
                <span>Learn & Grow</span>
            </div>
        </div>
        <div class="nav-links">
            <a onclick="switchMode('student')"><i class="fas fa-user-graduate"></i> Student</a>
            <a onclick="switchMode('admin')" class="premium-btn"><i class="fas fa-user-cog"></i> suraj </a>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Student View -->
        <div id="studentView">
            <!-- Breadcrumb -->
            <div class="breadcrumb" id="studentBreadcrumb">
                <span class="breadcrumb-item active" onclick="studentNavigateTo('branches')">Branches</span>
            </div>

            <!-- Content Grid -->
            <div id="studentContent"></div>
        </div>

        <!-- Admin View -->
        <div id="adminView" class="hidden">
            <!-- Access Message -->
            <div id="adminAccess" class="access-message">
                <i class="fas fa-lock"></i>
                <h2>Admin Access Required</h2>
                <p>Enter admin password to continue</p>
                <input type="password" id="adminPassword" class="admin-input-group" style="margin-bottom: 20px; width: 100%; padding: 12px; background: rgba(255,255,255,0.1); border: 2px solid #00d4ff; border-radius: 10px; color: #fff;">
                <button class="access-btn" onclick="verifyAdmin()">Unlock Admin Panel</button>
            </div>

            <!-- Admin Panel -->
            <div id="adminPanel" class="hidden">
                <div class="admin-panel">
                    <div class="admin-header">
                        <h2>Admin Dashboard</h2>
                        <div class="admin-tabs">
                            <button class="admin-tab active" onclick="switchAdminTab('branches')">Branches</button>
                            <button class="admin-tab" onclick="switchAdminTab('semesters')">Semesters</button>
                            <button class="admin-tab" onclick="switchAdminTab('subjects')">Subjects</button>
                            <button class="admin-tab" onclick="switchAdminTab('units')">Units</button>
                            <button class="admin-tab" onclick="switchAdminTab('content')">Content</button>
                        </div>
                    </div>

                    <!-- Admin Forms -->
                    <div id="adminForms"></div>

                    <!-- Admin List -->
                    <div id="adminList" class="admin-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            databaseURL: "https://apnacollegesuraj-default-rtdb.firebaseio.com/"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Global Variables
        let currentMode = 'student';
        let adminAuthenticated = false;
        let currentStudentPath = {
            type: 'branches',
            branchId: null,
            semesterId: null,
            subjectId: null,
            unitId: null
        };
        let currentAdminTab = 'branches';
        let editingItem = null;

        // Switch between student and admin mode
        function switchMode(mode) {
            currentMode = mode;
            if (mode === 'student') {
                document.getElementById('studentView').classList.remove('hidden');
                document.getElementById('adminView').classList.add('hidden');
                loadStudentView();
            } else {
                document.getElementById('studentView').classList.add('hidden');
                document.getElementById('adminView').classList.remove('hidden');
                if (!adminAuthenticated) {
                    document.getElementById('adminAccess').classList.remove('hidden');
                    document.getElementById('adminPanel').classList.add('hidden');
                } else {
                    document.getElementById('adminAccess').classList.add('hidden');
                    document.getElementById('adminPanel').classList.remove('hidden');
                    loadAdminView();
                }
            }
        }

        // Verify admin password
        function verifyAdmin() {
            const password = document.getElementById('adminPassword').value;
            if (password === 'suraj@127') { // You can change this password
                adminAuthenticated = true;
                document.getElementById('adminAccess').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadAdminView();
            } else {
                alert('Incorrect password!');
            }
        }

        // Load Student View
        function loadStudentView() {
            updateStudentBreadcrumb();
            if (currentStudentPath.type === 'branches') {
                loadBranches();
            } else if (currentStudentPath.type === 'semesters') {
                loadSemesters(currentStudentPath.branchId);
            } else if (currentStudentPath.type === 'subjects') {
                loadSubjects(currentStudentPath.branchId, currentStudentPath.semesterId);
            } else if (currentStudentPath.type === 'units') {
                loadUnits(currentStudentPath.branchId, currentStudentPath.semesterId, currentStudentPath.subjectId);
            } else if (currentStudentPath.type === 'content') {
                loadContent(currentStudentPath.branchId, currentStudentPath.semesterId, currentStudentPath.subjectId, currentStudentPath.unitId);
            }
        }

        // Load Branches
        function loadBranches() {
            const content = document.getElementById('studentContent');
            content.innerHTML = '<div class="loader"><div class="loader-circle"></div><div class="loader-circle"></div><div class="loader-circle"></div></div>';
            
            database.ref('branches').once('value', (snapshot) => {
                const branches = snapshot.val() || {};
                let html = '<div class="content-grid">';
                
                Object.keys(branches).forEach(key => {
                    const branch = branches[key];
                    html += `
                        <div class="content-box" onclick="studentNavigateTo('semesters', '${key}')">
                            <i class="fas fa-building"></i>
                            <h3>${branch.name}</h3>
                            <p>${branch.description || ''}</p>
                            <div class="content-count">6</div>
                        </div>
                    `;
                });
                
                html += '</div>';
                content.innerHTML = html;
            });
        }

        // Load Semesters
        function loadSemesters(branchId) {
            const content = document.getElementById('studentContent');
            content.innerHTML = '<div class="loader"><div class="loader-circle"></div><div class="loader-circle"></div><div class="loader-circle"></div></div>';
            
            database.ref(`branches/${branchId}/semesters`).once('value', (snapshot) => {
                const semesters = snapshot.val() || {};
                let html = '<div class="content-grid">';
                
                // Create 6 semesters by default
                for (let i = 1; i <= 6; i++) {
                    const semesterData = semesters[i] || { name: `Semester ${i}` };
                    html += `
                        <div class="content-box" onclick="studentNavigateTo('subjects', '${branchId}', ${i})">
                            <i class="fas fa-calendar-alt"></i>
                            <h3>Semester ${i}</h3>
                            <p>${semesterData.description || `Semester ${i} Subjects`}</p>
                            <div class="content-count">${semesterData.subjectCount || 0}</div>
                        </div>
                    `;
                }
                
                html += '</div>';
                content.innerHTML = html;
            });
        }

        // Load Subjects
        function loadSubjects(branchId, semesterId) {
            const content = document.getElementById('studentContent');
            content.innerHTML = '<div class="loader"><div class="loader-circle"></div><div class="loader-circle"></div><div class="loader-circle"></div></div>';
            
            database.ref(`branches/${branchId}/semesters/${semesterId}/subjects`).once('value', (snapshot) => {
                const subjects = snapshot.val() || {};
                let html = '<div class="content-grid">';
                
                Object.keys(subjects).forEach(key => {
                    const subject = subjects[key];
                    html += `
                        <div class="content-box" onclick="studentNavigateTo('units', '${branchId}', ${semesterId}, '${key}')">
                            <i class="fas fa-book"></i>
                            <h3>${subject.name}</h3>
                            <p>${subject.description || ''}</p>
                            <div class="content-count">${subject.unitCount || 0}</div>
                        </div>
                    `;
                });
                
                html += '</div>';
                content.innerHTML = html;
            });
        }

        // Load Units
        function loadUnits(branchId, semesterId, subjectId) {
            const content = document.getElementById('studentContent');
            content.innerHTML = '<div class="loader"><div class="loader-circle"></div><div class="loader-circle"></div><div class="loader-circle"></div></div>';
            
            database.ref(`branches/${branchId}/semesters/${semesterId}/subjects/${subjectId}/units`).once('value', (snapshot) => {
                const units = snapshot.val() || {};
                let html = '<div class="content-grid">';
                
                Object.keys(units).forEach(key => {
                    const unit = units[key];
                    html += `
                        <div class="content-box" onclick="studentNavigateTo('content', '${branchId}', ${semesterId}, '${subjectId}', '${key}')">
                            <i class="fas fa-layer-group"></i>
                            <h3>${unit.name}</h3>
                            <p>${unit.description || ''}</p>
                            <div class="content-count">3</div>
                        </div>
                    `;
                });
                
                html += '</div>';
                content.innerHTML = html;
            });
        }

        // Load Content
        function loadContent(branchId, semesterId, subjectId, unitId) {
            const content = document.getElementById('studentContent');
            
            database.ref(`branches/${branchId}/semesters/${semesterId}/subjects/${subjectId}/units/${unitId}`).once('value', (snapshot) => {
                const unit = snapshot.val() || {};
                
                let html = `
                    <div class="content-viewer">
                        <div class="content-tabs">
                            <button class="content-tab active" onclick="showContentType('video', '${branchId}', ${semesterId}, '${subjectId}', '${unitId}')">
                                <i class="fas fa-video"></i> Video Lecture
                            </button>
                            <button class="content-tab" onclick="showContentType('notes', '${branchId}', ${semesterId}, '${subjectId}', '${unitId}')">
                                <i class="fas fa-file-alt"></i> Notes
                            </button>
                            <button class="content-tab" onclick="showContentType('questions', '${branchId}', ${semesterId}, '${subjectId}', '${unitId}')">
                                <i class="fas fa-question-circle"></i> Previous Questions
                            </button>
                        </div>
                        <div class="content-display" id="contentDisplay">
                `;
                
                if (unit.video) {
                    html += `
                        <div class="video-container">
                            <iframe src="${unit.video}" frameborder="0" allowfullscreen></iframe>
                        </div>
                    `;
                } else if (unit.notes) {
                    html += `<div class="notes-content">${unit.notes}</div>`;
                } else if (unit.questions) {
                    html += `<ul class="questions-list">`;
                    unit.questions.split('\n').forEach(q => {
                        if (q.trim()) html += `<li>${q}</li>`;
                    });
                    html += `</ul>`;
                } else {
                    html += `<p style="text-align: center; color: #00d4ff;">No content available</p>`;
                }

        // Show Content Type
        function showContentType(type, branchId, semesterId, subjectId, unitId) {
            const tabs = document.querySelectorAll('.content-tab');
            tabs.forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            
            database.ref(`branches/${branchId}/semesters/${semesterId}/subjects/${subjectId}/units/${unitId}`).once('value', (snapshot) => {
                const unit = snapshot.val() || {};
                const display = document.getElementById('contentDisplay');
                
                if (type === 'video') {
                    if (unit.video) {
                        display.innerHTML = `
                            <div class="video-container">
                                <iframe src="${unit.video}" frameborder="0" allowfullscreen></iframe>
                            </div>
                        `;
                    } else {
                        display.innerHTML = '<p style="text-align: center; color: #00d4ff;">No video available</p>';
                    }
                } else if (type === 'notes') {
                    if (unit.notes) {
                        display.innerHTML = `<div class="notes-content">${unit.notes}</div>`;
                    } else {
                        display.innerHTML = '<p style="text-align: center; color: #00d4ff;">No notes available</p>';
                    }
                } else if (type === 'questions') {
                    if (unit.questions) {
                        let html = '<ul class="questions-list">';
                        unit.questions.split('\n').forEach(q => {
                            if (q.trim()) html += `<li>${q}</li>`;
                        });
                        html += '</ul>';
                        display.innerHTML = html;
                    } else {
                        display.innerHTML = '<p style="text-align: center; color: #00d4ff;">No questions available</p>';
                    }
                }
            });
        }

            });
            
            const list = document.getElementById('adminList');
            list.innerHTML = '<p style="text-align: center; color: #00d4ff;">Select branch, semester, subject, and unit to edit content</p>';
        }

        // Load Content Semesters
        function loadContentSemesters(branchId) {
            if (!branchId) return;
            
            const select = document.getElementById('contentSemester');
            select.innerHTML = '<option value="">Select Semester</option>';
            
            for (let i = 1; i <= 6; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = `Semester ${i}`;
                select.appendChild(option);
            }
        }

        // Load Content Subjects
        function loadContentSubjects() {
            const branchId = document.getElementById('contentBranch').value;
            const semesterId = document.getElementById('contentSemester').value;
            
            if (!branchId || !semesterId) return;
            
            const select = document.getElementById('contentSubject');
            select.innerHTML = '<option value="">Select Subject</option>';
            
            database.ref(`branches/${branchId}/semesters/${semesterId}/subjects`).once('value', (snapshot) => {
                const subjects = snapshot.val() || {};
                
                Object.keys(subjects).forEach(key => {
                    const option = document.createElement('option');
                    option.value = key;
                    option.textContent = subjects[key].name;
                    select.appendChild(option);
                });
            });
        }

        // Load Content Units
        function loadContentUnits() {
            const branchId = document.getElementById('contentBranch').value;
            const semesterId = document.getElementById('contentSemester').value;
            const subjectId = document.getElementById('contentSubject').value;
            
            if (!branchId || !semesterId || !subjectId) return;
            
            const select = document.getElementById('contentUnit');
            select.innerHTML = '<option value="">Select Unit</option>';
            
            database.ref(`branches/${branchId}/semesters/${semesterId}/subjects/${subjectId}/units`).once('value', (snapshot) => {
                const units = snapshot.val() || {};
                
                Object.keys(units).forEach(key => {
                    const option = document.createElement('option');
                    option.value = key;
                    option.textContent = units[key].name;
                    select.appendChild(option);
                });
            });
        }

        // Save Content
        function saveContent() {
            const branchId = document.getElementById('contentBranch').value;
            const semesterId = document.getElementById('contentSemester').value;
            const subjectId = document.getElementById('contentSubject').value;
            const unitId = document.getElementById('contentUnit').value;
            const video = document.getElementById('contentVideo').value;
            const notes = document.getElementById('contentNotes').value;
            const questions = document.getElementById('contentQuestions').value;
            
            if (!branchId || !semesterId || !subjectId || !unitId) {
                alert('Please select all fields');
                return;
            }
            
            const contentData = {};
            
            if (video) contentData.video = video;
            if (notes) contentData.notes = notes;
            if (questions) contentData.questions = questions;
            
            contentData.timestamp = Date.now();
            
            database.ref(`branches/${branchId}/semesters/${semesterId}/subjects/${subjectId}/units/${unitId}`).update(contentData).then(() => {
                alert('Content saved successfully');
                document.getElementById('contentVideo').value = '';
                document.getElementById('contentNotes').value = '';
                document.getElementById('contentQuestions').value = '';
            });
        }

        // Event Listeners for dynamic content
        document.addEventListener('change', function(e) {
            if (e.target.id === 'subjectBranch' || e.target.id === 'subjectSemester') {
                const branchId = document.getElementById('subjectBranch')?.value;
                const semesterId = document.getElementById('subjectSemester')?.value;
                if (branchId && semesterId) {
                    loadSubjectsList(branchId, semesterId);
                }
            }
            
            if (e.target.id === 'unitSubject') {
                const branchId = document.getElementById('unitBranch')?.value;
                const semesterId = document.getElementById('unitSemester')?.value;
                const subjectId = e.target.value;
                if (branchId && semesterId && subjectId) {
                    loadUnitsList(branchId, semesterId, subjectId);
                }
            }
            
            if (e.target.id === 'contentUnit') {
                const branchId = document.getElementById('contentBranch')?.value;
                const semesterId = document.getElementById('contentSemester')?.value;
                const subjectId = document.getElementById('contentSubject')?.value;
                const unitId = e.target.value;
                
                if (branchId && semesterId && subjectId && unitId) {
                    database.ref(`branches/${branchId}/semesters/${semesterId}/subjects/${subjectId}/units/${unitId}`).once('value', (snapshot) => {
                        const unit = snapshot.val() || {};
                        document.getElementById('contentVideo').value = unit.video || '';
                        document.getElementById('contentNotes').value = unit.notes || '';
                        document.getElementById('contentQuestions').value = unit.questions || '';
                    });
                }
            }
        });

        // Initialize with student view
        switchMode('student');
    </script>
</body>
</html>
