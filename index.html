<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EduPortal - Student & Admin with Topics</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts - Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- Three.js for 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #1a1a2e;
            color: #fff;
            overflow-x: hidden;
        }

        /* ===== PREMIUM NAVBAR ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
            background: rgba(26, 26, 46, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #00d4ff;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            transform: translateY(-100%);
            animation: slideDown 0.8s ease forwards;
        }

        @media (min-width: 768px) {
            .navbar {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                padding: 15px 30px;
            }
        }

        @media (min-width: 1024px) {
            .navbar {
                padding: 15px 50px;
            }
        }

        @keyframes slideDown {
            to { transform: translateY(0); }
        }

        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .logo-section {
                flex-direction: row;
                width: auto;
            }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .logo i {
            font-size: 2rem;
            color: #00d4ff;
            filter: drop-shadow(0 0 10px #00d4ff);
            animation: glow 2s ease-in-out infinite;
        }

        @media (min-width: 768px) {
            .logo i {
                font-size: 2.5rem;
            }
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 10px #00d4ff); }
            50% { filter: drop-shadow(0 0 20px #00d4ff); }
        }

        .logo h1 {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(45deg, #fff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @media (min-width: 768px) {
            .logo h1 {
                font-size: 1.5rem;
            }
        }

        .social-media {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
        }

        @media (min-width: 768px) {
            .social-media {
                width: auto;
                margin-left: 20px;
            }
        }

        .social-icon {
            width: 35px;
            height: 35px;
            border: 2px solid #00d4ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            font-size: 0.9rem;
        }

        @media (min-width: 768px) {
            .social-icon {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
        }

        .social-icon::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #00d4ff;
            transition: 0.3s;
            z-index: -1;
        }

        .social-icon:hover::before {
            left: 0;
        }

        .social-icon:hover {
            color: #1a1a2e;
            transform: translateY(-5px);
            box-shadow: 0 0 20px #00d4ff;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            width: 100%;
            flex-wrap: wrap;
        }

        @media (min-width: 768px) {
            .nav-links {
                width: auto;
                gap: 20px;
            }
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            position: relative;
            padding: 5px 0;
            transition: 0.3s;
            cursor: pointer;
            font-size: 0.9rem;
        }

        @media (min-width: 768px) {
            .nav-links a {
                font-size: 1rem;
            }
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: #00d4ff;
            transition: 0.3s;
            box-shadow: 0 0 10px #00d4ff;
        }

        .nav-links a:hover::before {
            width: 100%;
        }

        .nav-links a:hover {
            color: #00d4ff;
        }

        .nav-links .premium-btn {
            border: 2px solid #00d4ff;
            padding: 6px 15px;
            border-radius: 40px;
            background: transparent;
            transition: 0.3s;
        }

        @media (min-width: 768px) {
            .nav-links .premium-btn {
                padding: 8px 20px;
            }
        }

        .nav-links .premium-btn:hover {
            background: #00d4ff;
            color: #1a1a2e;
            box-shadow: 0 0 20px #00d4ff;
        }

        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            color: #00d4ff;
            cursor: pointer;
        }

        /* ===== MAIN CONTAINER ===== */
        .main-container {
            margin-top: 180px;
            padding: 15px;
        }

        @media (min-width: 768px) {
            .main-container {
                margin-top: 120px;
                padding: 20px 30px;
            }
        }

        @media (min-width: 1024px) {
            .main-container {
                padding: 30px 50px;
            }
        }

        /* ===== ADMIN PANEL ===== */
        .admin-panel {
            background: rgba(255,255,255,0.05);
            border: 2px solid #00d4ff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        @media (min-width: 768px) {
            .admin-panel {
                padding: 30px;
                margin-bottom: 30px;
            }
        }

        .admin-header {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        @media (min-width: 768px) {
            .admin-header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 30px;
            }
        }

        .admin-header h2 {
            font-size: 1.5rem;
            background: linear-gradient(45deg, #fff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @media (min-width: 768px) {
            .admin-header h2 {
                font-size: 2rem;
            }
        }

        .admin-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .admin-tab {
            padding: 8px 15px;
            border: 2px solid #00d4ff;
            border-radius: 30px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        @media (min-width: 768px) {
            .admin-tab {
                padding: 10px 20px;
                font-size: 1rem;
            }
        }

        .admin-tab.active {
            background: #00d4ff;
            color: #1a1a2e;
        }

        .admin-tab:hover {
            background: #00d4ff;
            color: #1a1a2e;
        }

        .admin-form {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        @media (min-width: 640px) {
            .admin-form {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .admin-form {
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            }
        }

        .admin-input-group {
            position: relative;
        }

        .admin-input-group input,
        .admin-input-group select,
        .admin-input-group textarea {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 2px solid #00d4ff;
            border-radius: 10px;
            color: #fff;
            outline: none;
            font-size: 14px;
        }

        @media (min-width: 768px) {
            .admin-input-group input,
            .admin-input-group select,
            .admin-input-group textarea {
                padding: 12px;
                font-size: 16px;
            }
        }

        .admin-input-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .file-upload {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-upload input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 2px solid #00d4ff;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        @media (min-width: 768px) {
            .file-upload-label {
                padding: 12px;
                font-size: 16px;
            }
        }

        .file-upload-label:hover {
            background: rgba(0,212,255,0.2);
        }

        .admin-btn {
            padding: 10px 20px;
            border: 2px solid #00d4ff;
            border-radius: 30px;
            background: transparent;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .admin-btn {
                padding: 12px 30px;
                font-size: 16px;
                width: auto;
            }
        }

        .admin-btn:hover {
            background: #00d4ff;
            color: #1a1a2e;
            box-shadow: 0 0 20px #00d4ff;
        }

        .admin-btn.delete {
            border-color: #ff4444;
        }

        .admin-btn.delete:hover {
            background: #ff4444;
            color: #fff;
        }

        .admin-list {
            margin-top: 20px;
        }

        .admin-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid #00d4ff;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        @media (min-width: 640px) {
            .admin-item {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .admin-item-info h4 {
            color: #00d4ff;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        @media (min-width: 768px) {
            .admin-item-info h4 {
                font-size: 1.2rem;
            }
        }

        .admin-item-info p {
            color: rgba(255,255,255,0.7);
            font-size: 12px;
        }

        @media (min-width: 768px) {
            .admin-item-info p {
                font-size: 14px;
            }
        }

        .admin-item-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .admin-item-actions button {
            padding: 5px 12px;
            border: 1px solid #00d4ff;
            border-radius: 20px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
            font-size: 12px;
        }

        @media (min-width: 768px) {
            .admin-item-actions button {
                padding: 5px 15px;
                font-size: 14px;
            }
        }

        .admin-item-actions button.edit:hover {
            background: #00d4ff;
            color: #1a1a2e;
        }

        .admin-item-actions button.delete:hover {
            background: #ff4444;
            border-color: #ff4444;
        }

        /* ===== CONTENT GRID ===== */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        @media (min-width: 480px) {
            .content-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 768px) {
            .content-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
            }
        }

        @media (min-width: 1024px) {
            .content-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 25px;
            }
        }

        @media (min-width: 1280px) {
            .content-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        .content-box {
            background: rgba(255,255,255,0.05);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .content-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,212,255,0.2), transparent);
            transition: 0.6s;
        }

        .content-box:hover::before {
            left: 100%;
        }

        .content-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(0,212,255,0.4);
        }

        @media (min-width: 768px) {
            .content-box:hover {
                transform: translateY(-10px);
                box-shadow: 0 0 40px rgba(0,212,255,0.4);
            }
        }

        .content-box i {
            font-size: 2rem;
            color: #00d4ff;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px #00d4ff);
        }

        @media (min-width: 768px) {
            .content-box i {
                font-size: 3rem;
            }
        }

        .content-box h3 {
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 5px;
        }

        @media (min-width: 768px) {
            .content-box h3 {
                font-size: 1.3rem;
            }
        }

        .content-box p {
            color: #00d4ff;
            font-size: 12px;
            margin-bottom: 10px;
        }

        @media (min-width: 768px) {
            .content-box p {
                font-size: 14px;
            }
        }

        .content-count {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #00d4ff;
            color: #1a1a2e;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 12px;
            box-shadow: 0 0 15px #00d4ff;
        }

        @media (min-width: 768px) {
            .content-count {
                width: 30px;
                height: 30px;
                font-size: 14px;
            }
        }

        /* ===== TOPICS GRID ===== */
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }

        .topic-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .topic-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(0,212,255,0.4);
        }

        .topic-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: #00d4ff;
            margin-bottom: 5px;
            text-shadow: 0 0 20px #00d4ff;
        }

        .topic-title {
            font-size: 0.95rem;
            color: #fff;
            margin-bottom: 5px;
        }

        .practical-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ff4444;
            color: #fff;
            padding: 3px 8px;
            border-radius: 15px;
            font-size: 0.65rem;
            font-weight: 600;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* ===== SUBJECT CONTENT SECTION (Previous Questions) ===== */
        .subject-content-section {
            background: rgba(255,255,255,0.03);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }

        @media (min-width: 768px) {
            .subject-content-section {
                padding: 30px;
            }
        }

        .subject-content-title {
            color: #00d4ff;
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @media (min-width: 768px) {
            .subject-content-title {
                font-size: 1.5rem;
            }
        }

        /* ===== BREADCRUMB ===== */
        .breadcrumb {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #00d4ff;
            border-radius: 30px;
            font-size: 12px;
        }

        @media (min-width: 768px) {
            .breadcrumb {
                gap: 10px;
                padding: 15px;
                font-size: 14px;
            }
        }

        .breadcrumb-item {
            color: #fff;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            transition: 0.3s;
        }

        @media (min-width: 768px) {
            .breadcrumb-item {
                padding: 5px 10px;
            }
        }

        .breadcrumb-item:hover {
            color: #00d4ff;
            background: rgba(0,212,255,0.1);
        }

        .breadcrumb-item.active {
            color: #00d4ff;
            font-weight: 600;
        }

        .breadcrumb-separator {
            color: #00d4ff;
            font-size: 10px;
        }

        @media (min-width: 768px) {
            .breadcrumb-separator {
                font-size: 14px;
            }
        }

        /* ===== CONTENT VIEWER ===== */
        .content-viewer {
            background: rgba(255,255,255,0.05);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            backdrop-filter: blur(10px);
        }

        @media (min-width: 768px) {
            .content-viewer {
                padding: 30px;
                margin-top: 30px;
                border-radius: 20px;
            }
        }

        .content-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        @media (min-width: 768px) {
            .content-tabs {
                gap: 15px;
            }
        }

        .content-tab {
            padding: 8px 15px;
            border: 2px solid #00d4ff;
            border-radius: 30px;
            background: transparent;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        @media (min-width: 768px) {
            .content-tab {
                padding: 10px 25px;
                font-size: 14px;
            }
        }

        .content-tab.active {
            background: #00d4ff;
            color: #1a1a2e;
        }

        .content-tab:hover {
            background: #00d4ff;
            color: #1a1a2e;
            transform: translateY(-2px);
        }

        .content-display {
            min-height: 200px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }

        @media (min-width: 768px) {
            .content-display {
                min-height: 300px;
                padding: 20px;
            }
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 10px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* 3D Container */
        .three-d-container {
            width: 100%;
            height: 400px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        #threeDCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .three-d-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .three-d-btn {
            width: 35px;
            height: 35px;
            background: rgba(0,212,255,0.8);
            border: none;
            border-radius: 50%;
            color: #1a1a2e;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .three-d-btn:hover {
            background: #00d4ff;
            transform: scale(1.1);
        }

        /* PDF Viewer */
        .pdf-container {
            width: 100%;
            height: 400px;
            border: 2px solid #00d4ff;
            border-radius: 10px;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            .pdf-container {
                height: 600px;
            }
        }

        .pdf-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(0,212,255,0.1);
            border-radius: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .file-info i {
            font-size: 1.5rem;
            color: #00d4ff;
        }

        .file-info a {
            color: #00d4ff;

        /* ===== HIDDEN CLASS ===== */

        /* ===== BACK TO TOP ===== */

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            databaseURL: "https://apnacollegesuraj-default-rtdb.firebaseio.com/"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Global Variables
        let currentMode = 'student';
        let adminAuthenticated = false;
        let currentStudentPath = {
            type: 'branches',
            branchId: null,
            semesterId: null,
            subjectId: null,
            unitId: null,
            topicId: null
        };
        let currentAdminTab = 'branches';
        let editingItem = null;
        let currentNotesPdf = null;
        let currentQuestionsPdf = null;
        let currentPractical3d = null;

        // 3D Variables
        let scene, camera, renderer, cube;
        let rotationSpeed = 0.01;

        // Switch between student and admin mode
        function switchMode(mode) {
            currentMode = mode;
            if (mode === 'student') {
                document.getElementById('studentView').classList.remove('hidden');
                document.getElementById('adminView').classList.add('hidden');
                navigateTo('branches');
            } else {
                document.getElementById('studentView').classList.add('hidden');
                document.getElementById('adminView').classList.remove('hidden');
                if (!adminAuthenticated) {
                    document.getElementById('adminAccess').classList.remove('hidden');
                    document.getElementById('adminPanel').classList.add('hidden');
                } else {
                    document.getElementById('adminAccess').classList.add('hidden');
                    document.getElementById('adminPanel').classList.remove('hidden');
                    loadAdminView();
                }
            }
        }

        // Verify admin password
        function verifyAdmin() {
            const password = document.getElementById('adminPassword').value;
            if (password === 'suraj@127') { // You can change this password
                adminAuthenticated = true;
                document.getElementById('adminAccess').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadAdminView();
            } else {
                alert('Incorrect password!');
            }
        }

        // Navigation Functions
        function navigateTo(type, branchId = null, semesterId = null, subjectId = null, unitId = null, topicId = null) {
            currentStudentPath = { type, branchId, semesterId, subjectId, unitId, topicId };
            updateStudentBreadcrumb();
            
            switch(type) {
                case 'branches':
                    loadBranches();
                    break;
                case 'semesters':
                    loadSemesters(branchId);
                    break;
                case 'subjects':
                    loadSubjects(branchId, semesterId);
                    break;
                case 'units':
                    loadUnits(branchId, semesterId, subjectId);
                    break;
                case 'topics':
                    loadTopics(branchId, semesterId, subjectId, unitId);
                    break;
                case 'content':
                    loadContent(branchId, semesterId, subjectId, unitId, topicId);
                    break;
            }
        }

        // Load Branches
        function loadBranches() {
            const content = document.getElementById('studentContent');
            content.innerHTML = '<div class="loader"><div class="loader-circle"></div><div class="loader-circle"></div><div class="loader-circle"></div></div>';
            
            database.ref('branches').once('value', (snapshot) => {
                const branches = snapshot.val() || {};
                let html = '<div class="content-grid">';
                
                Object.keys(branches).forEach(key => {
                    const branch = branches[key];
                    html += `
                        <div class="content-box" onclick="navigateTo('semesters', '${key}')">
                            <i class="fas fa-building"></i>
                            <h3>${branch.name}</h3>
                            <p>${branch.description || ''}</p>
                            <div class="content-count">6</div>
                        </div>
                    `;
                });
                
                html += '</div>';
                content.innerHTML = html;
            });
        }

        // Load Semesters
        function loadSemesters(branchId) {
            const content = document.getElementById('studentContent');
            content.innerHTML = '<div class="loader"><div class="loader-circle"></div><div class="loader-circle"></div><div class="loader-circle"></div></div>';
            
            database.ref(`branches/${branchId}/semesters`).once('value', (snapshot) => {
                const semesters = snapshot.val() || {};
                let html = '<div class="content-grid">';
                
                for (let i = 1; i <= 6; i++) {
                    const semesterData = semesters[i] || { name: `Semester ${i}` };
                    html += `
                        <div class="content-box" onclick="navigateTo('subjects', '${branchId}', ${i})">
                            <i class="fas fa-calendar-alt"></i>
                            <h3>Semester ${i}</h3>
                            <p>${semesterData.description || `Semester ${i} Subjects`}</p>
                            <div class="content-count">${semesterData.subjectCount || 0}</div>
                        </div>
                    `;
                }
                
                html += '</div>';
                content.innerHTML = html;
            });
        }

        // Load Subjects with Previous Questions
        function loadSubjects(branchId, semesterId) {
            const content = document.getElementById('studentContent');
            content.innerHTML = '<div class="loader"><div class="loader-circle"></div><div class="loader-circle"></div><div class="loader-circle"></div></div>';
            
            Promise.all([
                database.ref(`branches/${branchId}/semesters/${semesterId}/subjects`).once('value'),
                database.ref(`branches/${branchId}/semesters/${semesterId}/subjects`).once('value')
            ]).then(([subjectsSnapshot]) => {
                const subjects = subjectsSnapshot.val() || {};
                let html = '';
                
                // Previous Questions Section at Subject Level
                html += '<div class="subject-content-section">';
                html += '<h3 class="subject-content-title"><i class="fas fa-question-circle"></i> Previous Year Questions</h3>';
                
                // Check if any subject has questions PDF
                let hasQuestions = false;
                Object.keys(subjects).forEach(key => {
                    const subject = subjects[key];
                    if (subject.questionsPdf) {
                        hasQuestions = true;
                        html += `
                            <div class="file-info" style="margin-bottom: 15px;">
                                <i class="fas fa-file-pdf"></i>
                                <a href="${subject.questionsPdf}" target="_blank">${subject.name} - Previous Questions PDF</a>
                            </div>
                        `;
                    }
                });
                
                if (!hasQuestions) {
                    html += '<p style="color: #00d4ff; text-align: center;">No previous questions available</p>';
                }
                
                html += '</div>';
                
                // Subjects Grid
                html += '<h3 style="margin: 20px 0; color: #00d4ff;"><i class="fas fa-book"></i> Subjects</h3>';
                html += '<div class="content-grid">';
                
                Object.keys(subjects).forEach(key => {
                    const subject = subjects[key];
                    html += `
                        <div class="content-box" onclick="navigateTo('units', '${branchId}', ${semesterId}, '${key}')">
                            <i class="fas fa-book"></i>
                            <h3>${subject.name}</h3>
                            <p>${subject.description || ''}</p>
                            <div class="content-count">${subject.unitCount || 0}</div>
                        </div>
                    `;
                });
                
                html += '</div>';
                content.innerHTML = html;
            });
        }

        // Load Units
        function loadUnits(branchId, semesterId, subjectId) {
            const content = document.getElementById('studentContent');
            content.innerHTML = '<div class="loader"><div class="loader-circle"></div><div class="loader-circle"></div><div class="loader-circle"></div></div>';
            
            database.ref(`branches/${branchId}/semesters/${semesterId}/subjects/${subjectId}/units`).once('value', (snapshot) => {
                const units = snapshot.val() || {};
                
                // Get subject name
                database.ref(`branches/${branchId}/semesters/${semesterId}/subjects/${subjectId}`).once('value', (subjectSnapshot) => {
                    const subject = subjectSnapshot.val() || { name: 'Subject' };
                    
                    let html = `<h3 style="margin: 20px 0; color: #00d4ff;"><i class="fas fa-layer-group"></i> ${subject.name} - Units</h3>`;
                    html += '<div class="content-grid">';
                    
                    Object.keys(units).forEach(key => {
                        const unit = units[key];
                        html += `
                            <div class="content-box" onclick="navigateTo('topics', '${branchId}', ${semesterId}, '${subjectId}', '${key}')">
                                <i class="fas fa-layer-group"></i>
                                <h3>${unit.name}</h3>
                                <p>${unit.description || ''}</p>
                                <div class="content-count">${unit.topicCount || 0}</div>
                            </div>
                        `;
                    });
                    
                    html += '</div>';
                    content.innerHTML = html;
                });
            });
        }

        // Load Topics (1.1, 1.2, 1.3 format)
        function loadTopics(branchId, semesterId, subjectId, unitId) {
            const content = document.getElementById('studentContent');
            content.innerHTML = '<div class="loader"><div class="loader-circle"></div><div class="loader-circle"></div><div class="loader-circle"></div></div>';
            
            database.ref(`branches/${branchId}/semesters/${semesterId}/subjects/${subjectId}/units/${unitId}/topics`).once('value', (snapshot) => {
                const topics = snapshot.val() || {};
                
                // Get unit name
                database.ref(`branches/${branchId}/semesters/${semesterId}/subjects/${subjectId}/units/${unitId}`).once('value', (unitSnapshot) => {
                    const unit = unitSnapshot.val() || { name: 'Unit' };
                    
                    let html = `<h3 style="margin: 20px 0; color: #00d4ff;"><i class="fas fa-list"></i> ${unit.name} - Topics</h3>`;
                    html += '<div class="topics-grid">';
                    
                    if (Object.keys(topics).length === 0) {
                        html += '<p style="color: #00d4ff; text-align: center; grid-column: 1/-1;">No topics available</p>';
                    } else {
                        Object.keys(topics).forEach(key => {
                            const topic = topics[key];
                            const isPractical = topic.practical3d ? true : false;
                            html += `
                                <div class="topic-card" onclick="navigateTo('content', '${branchId}', ${semesterId}, '${subjectId}', '${unitId}', '${key}')">
                                    ${isPractical ? '<span class="practical-badge">3D</span>' : ''}
                                    <div class="topic-number">${topic.number || '1.1'}</div>
                                    <div class="topic-title">${topic.name}</div>
                                </div>
                            `;
                        });
                    }
                    
                    html += '</div>';
                    content.innerHTML = html;
                });
            });
        }

        // Load Content (with 3 options)
        function loadContent(branchId, semesterId, subjectId, unitId, topicId) {
            const content = document.getElementById('studentContent');
            
            database.ref(`branches/${branchId}/semesters/${semesterId}/subjects/${subjectId}/units/${unitId}/topics/${topicId}`).once('value', (snapshot) => {
                const topic = snapshot.val() || { name: 'Topic', number: '1.1' };
                
                let html = `
                    <div class="content-viewer">
                        <h3 style="color: #00d4ff; margin-bottom: 20px; text-align: center;">${topic.number} - ${topic.name}</h3>
                        
                        <div class="content-tabs">
                            <button class="content-tab active" onclick="showTopicContent('video', '${branchId}', ${semesterId}, '${subjectId}', '${unitId}', '${topicId}')">
                                <i class="fas fa-video"></i> Video
                            </button>
                            <button class="content-tab" onclick="showTopicContent('notes', '${branchId}', ${semesterId}, '${subjectId}', '${unitId}', '${topicId}')">
                                <i class="fas fa-file-alt"></i> Notes
                            </button>
                `;
                
                if (topic.practical3d) {
                    html += `
                            <button class="content-tab" onclick="showTopicContent('practical', '${branchId}', ${semesterId}, '${subjectId}', '${unitId}', '${topicId}')">
                                <i class="fas fa-cube"></i> 3D Practical
                            </button>
                    `;
                }
                
                html += `
                        </div>
                        
                        <div class="content-display" id="contentDisplay">
                            <div style="text-align: center; padding: 50px;">
                                <i class="fas fa-play-circle" style="font-size: 5rem; color: #00d4ff; margin-bottom: 20px;"></i>
                                <h3>Click on any tab to view content</h3>
                            </div>
                        </div>
                    </div>
                `;
                
                content.innerHTML = html;
            });
        }

        // Show Topic Content
        function showTopicContent(type, branchId, semesterId, subjectId, unitId, topicId) {
            const tabs = document.querySelectorAll('.content-tab');
            tabs.forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            
            database.ref(`branches/${branchId}/semesters/${semesterId}/subjects/${subjectId}/units/${unitId}/topics/${topicId}`).once('value', (snapshot) => {
                const topic = snapshot.val() || {};
                const display = document.getElementById('contentDisplay');
                
                if (type === 'video') {
                    if (topic.video) {
                        display.innerHTML = `
                            <div class="video-container">
                                <iframe src="${topic.video}" frameborder="0" allowfullscreen></iframe>
                            </div>
                        `;
                    } else {
                        display.innerHTML = '<p style="text-align: center; color: #00d4ff;">No video available</p>';
                    }
                }
                else if (type === 'notes') {
                    if (topic.notesPdf) {
                        display.innerHTML = `
                            <div class="file-info">
                                <i class="fas fa-file-pdf"></i>
                                <a href="${topic.notesPdf}" target="_blank">Download Notes PDF</a>
                            </div>
                            <div class="pdf-container">
                                <iframe src="${topic.notesPdf}" width="100%" height="400px"></iframe>
                            </div>
                        `;
                    } else {
                        display.innerHTML = '<p style="text-align: center; color: #00d4ff;">No notes available</p>';
                    }
                }
                else if (type === 'practical') {
                    if (topic.practical3d) {
                        display.innerHTML = `
                            <div class="three-d-container" id="threeDContainer">
                                <canvas id="threeDCanvas"></canvas>
                                <div class="three-d-controls">
                                    <button class="three-d-btn" onclick="rotate3D('left')"><i class="fas fa-rotate-left"></i></button>
                                    <button class="three-d-btn" onclick="rotate3D('right')"><i class="fas fa-rotate-right"></i></button>
                                    <button class="three-d-btn" onclick="zoom3D('in')"><i class="fas fa-search-plus"></i></button>
                                    <button class="three-d-btn" onclick="zoom3D('out')"><i class="fas fa-search-minus"></i></button>
                                </div>
                            </div>
                            <p style="text-align: center; color: #00d4ff; margin-top: 10px;">🔬 3D Practical Demonstration</p>
                        `;
                        setTimeout(init3D, 100);
                    } else {
                        display.innerHTML = '<p style="text-align: center; color: #00d4ff;">No 3D practical available</p>';
                    }
                }
            });
        }

        // 3D Functions
        function init3D() {
            const canvas = document.getElementById('threeDCanvas');
            if(!canvas) return;
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            
            camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            camera.position.z = 5;
            
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            const ambientLight = new THREE.AmbientLight(0x404040);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(1, 1, 1);
            scene.add(directionalLight);
            
            const backLight = new THREE.PointLight(0x00d4ff, 0.5);
            backLight.position.set(-2, 0, -2);
            scene.add(backLight);
            
            const geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
            const edges = new THREE.EdgesGeometry(geometry);
            
            const material = new THREE.MeshPhongMaterial({ 
                color: 0x00d4ff,
                transparent: true,
                opacity: 0.3,
                emissive: 0x112233
            });
            cube = new THREE.Mesh(geometry, material);
            scene.add(cube);
            
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00d4ff }));
            cube.add(line);
            
            const particleGeometry = new THREE.BufferGeometry();
            const particleCount = 100;
            const positions = new Float32Array(particleCount * 3);
            
            for(let i = 0; i < particleCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 10;
                positions[i+1] = (Math.random() - 0.5) * 10;
                positions[i+2] = (Math.random() - 0.5) * 10;
            }
            
            particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const particleMaterial = new THREE.PointsMaterial({ color: 0x00d4ff, size: 0.05 });
            const particles = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particles);
            
            function animate() {
                requestAnimationFrame(animate);
                if(cube) {
                    cube.rotation.x += rotationSpeed;
                    cube.rotation.y += rotationSpeed;
                }
                renderer.render(scene, camera);
            }
            animate();
        }

        function rotate3D(direction) {
            if(direction === 'left') rotationSpeed += 0.01;
            else if(direction === 'right') rotationSpeed -= 0.01;
        }

        function zoom3D(direction) {
            if(camera) {
                if(direction === 'in') camera.position.z -= 0.5;
                else if(direction === 'out') camera.position.z += 0.5;
            }
        }

        // Load Topics List

        // Save Topic
        function saveTopic() {
            const branchId = document.getElementById('topicBranch').value;
            const semesterId = document.getElementById('topicSemester').value;
            const subjectId = document.getElementById('topicSubject').value;
            const unitId = document.getElementById('topicUnit').value;
            const number = document.getElementById('topicNumber').value;
            const name = document.getElementById('topicName').value;
            const hasPractical = document.getElementById('hasPractical').checked;
            
            if (!branchId || !semesterId || !subjectId || !unitId || !number || !name) {
                alert('Please fill all required fields');
                return;
            }
            
            const topicData = {
                number: number,
                name: name,
                practical3d: hasPractical,
                timestamp: Date.now()
            };
            
            if (editingItem) {
                database.ref(`branches/${branchId}/semesters/${semesterId}/subjects/${subjectId}/units/${unitId}/topics/${editingItem}`).update(topicData).then(() => {
                    alert('Topic updated successfully');
                    editingItem = null;
                    document.getElementById('topicNumber').value = '';
                    document.getElementById('topicName').value = '';
                    document.getElementById('hasPractical').checked = false;
                    loadTopicsList(branchId, semesterId, subjectId, unitId);
                });
            } else {
                database.ref(`branches/${branchId}/semesters/${semesterId}/subjects/${subjectId}/units/${unitId}/topics`).push(topicData).then(() => {
                    alert('Topic added successfully');
                    document.getElementById('topicNumber').value = '';
                    document.getElementById('topicName').value = '';
                    document.getElementById('hasPractical').checked = false;
                    loadTopicsList(branchId, semesterId, subjectId, unitId);
                });
            }
        }

        // Handle Notes PDF Upload
        function handleNotesPdfUpload(input) {
            const file = input.files[0];
            if (file) {
                const progressDiv = document.getElementById('uploadProgress');
                progressDiv.style.display = 'block';
                progressDiv.innerHTML = 'Uploading Notes PDF...';
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentNotesPdf = e.target.result;
                    progressDiv.innerHTML = 'Notes PDF uploaded successfully!';
                    setTimeout(() => {
                        progressDiv.style.display = 'none';
                    }, 3000);
                };
                reader.readAsDataURL(file);
            }
        }

        // Save Topic Content
        function saveTopicContent() {
            const branchId = document.getElementById('contentBranch').value;
            const semesterId = document.getElementById('contentSemester').value;
            const subjectId = document.getElementById('contentSubject').value;
            const unitId = document.getElementById('contentUnit').value;
            const topicId = document.getElementById('contentTopic').value;
            const video = document.getElementById('contentVideo').value;
            
            if (!branchId || !semesterId || !subjectId || !unitId || !topicId) {
                alert('Please select all fields');
                return;
            }
            
            const contentData = {};
            
            if (video) contentData.video = video;
            if (currentNotesPdf) contentData.notesPdf = currentNotesPdf;
            if (currentPractical3d) contentData.practical3d = currentPractical3d;
            
            contentData.timestamp = Date.now();
            
            database.ref(`branches/${branchId}/semesters/${semesterId}/subjects/${subjectId}/units/${unitId}/topics/${topicId}`).once('value', (snapshot) => {
                const existingData = snapshot.val() || {};
                
                if (!video && existingData.video) contentData.video = existingData.video;
                if (!currentNotesPdf && existingData.notesPdf) contentData.notesPdf = existingData.notesPdf;
                if (!currentPractical3d && existingData.practical3d) contentData.practical3d = existingData.practical3d;
                
                database.ref(`branches/${branchId}/semesters/${semesterId}/subjects/${subjectId}/units/${unitId}/topics/${topicId}`).update(contentData).then(() => {
                    alert('Topic content saved successfully');
                    document.getElementById('contentVideo').value = '';
                    document.getElementById('notesPdf').value = '';
                    document.getElementById('practical3d').value = '';
                    currentNotesPdf = null;
                    currentPractical3d = null;
                });
            });
        }

        // Event Listeners for dynamic content
        document.addEventListener('change', function(e) {
            if (e.target.id === 'subjectBranch' || e.target.id === 'subjectSemester') {
                const branchId = document.getElementById('subjectBranch')?.value;
                const semesterId = document.getElementById('subjectSemester')?.value;
                if (branchId && semesterId) {
                    loadSubjectsList(branchId, semesterId);
                }
            }
            
            if (e.target.id === 'unitSubject') {
                const branchId = document.getElementById('unitBranch')?.value;
                const semesterId = document.getElementById('unitSemester')?.value;
                const subjectId = e.target.value;
                if (branchId && semesterId && subjectId) {
                    loadUnitsList(branchId, semesterId, subjectId);
                }
            }
            
            if (e.target.id === 'topicUnit') {
                const branchId = document.getElementById('topicBranch')?.value;
                const semesterId = document.getElementById('topicSemester')?.value;
                const subjectId = document.getElementById('topicSubject')?.value;
                const unitId = e.target.value;
                if (branchId && semesterId && subjectId && unitId) {
                    loadTopicsList(branchId, semesterId, subjectId, unitId);
                }
            }
            
            if (e.target.id === 'contentTopic') {
                const branchId = document.getElementById('contentBranch')?.value;
                const semesterId = document.getElementById('contentSemester')?.value;
                const subjectId = document.getElementById('contentSubject')?.value;
                const unitId = document.getElementById('contentUnit')?.value;
                const topicId = e.target.value;
                
                if (branchId && semesterId && subjectId && unitId && topicId) {
                    database.ref(`branches/${branchId}/semesters/${semesterId}/subjects/${subjectId}/units/${unitId}/topics/${topicId}`).once('value', (snapshot) => {
                        const topic = snapshot.val() || {};
                        document.getElementById('contentVideo').value = topic.video || '';
                        document.getElementById('notesPdf').value = '';
                        document.getElementById('practical3d').value = '';
                        currentNotesPdf = topic.notesPdf || null;
                        currentPractical3d = topic.practical3d || null;
                    });
                }
            }
        });

        // Mobile Menu Toggle
        function toggleMenu() {
            const navLinks = document.querySelector('.nav-links');
            navLinks.classList.toggle('active');
            
            const menuToggle = document.querySelector('.menu-toggle i');
            if(navLinks.classList.contains('active')) {
                menuToggle.classList.remove('fa-bars');
                menuToggle.classList.add('fa-times');
            } else {
                menuToggle.classList.remove('fa-times');
                menuToggle.classList.add('fa-bars');
            }
        }

        // Back to Top
        const backToTop = document.getElementById('backToTop');
        
        window.addEventListener('scroll', () => {
            if(window.scrollY > 500) {
                backToTop.classList.add('show');
            } else {
                backToTop.classList.remove('show');
            }
        });

        backToTop.addEventListener('click', (e) => {
            e.preventDefault();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            const navLinks = document.querySelector('.nav-links');
            const menuToggle = document.querySelector('.menu-toggle');
            
            if (!navLinks.contains(e.target) && !menuToggle.contains(e.target) && navLinks.classList.contains('active')) {
                navLinks.classList.remove('active');
                document.querySelector('.menu-toggle i').classList.remove('fa-times');
                document.querySelector('.menu-toggle i').classList.add('fa-bars');
            }
        });

        // Initialize
        navigateTo('branches');
    </script>
