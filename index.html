<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Student Problem Solver</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        /* Dashboard Styles */
        .dashboard-container {
            max-width: 1400px;
            margin: 20px auto;
            padding: 20px;
            background: #1a1a2e;
            border: 2px solid #00d4ff;
            box-shadow: 0 0 25px #00d4ff;
            border-radius: 10px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 2px solid #00d4ff;
            margin-bottom: 30px;
            color: #fff;
        }

        .dashboard-header h2 {
            color: #00d4ff;
        }

        .logout-btn {
            padding: 10px 20px;
            background: transparent;
            border: 2px solid #ff4444;
            color: #fff;
            cursor: pointer;
            border-radius: 5px;
        }

        .logout-btn:hover {
            background: #ff4444;
        }

        /* Admin Tabs */
        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .admin-tab {
            padding: 10px 20px;
            background: transparent;
            border: 2px solid #00d4ff;
            color: #fff;
            cursor: pointer;
            border-radius: 5px;
        }

        .admin-tab.active {
            background: #00d4ff;
            color: #1a1a2e;
        }

        /* Student Branch Tabs */
        .branch-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .branch-tab {
            padding: 10px 20px;
            background: transparent;
            border: 2px solid #00d4ff;
            color: #fff;
            cursor: pointer;
            border-radius: 5px;
        }

        .branch-tab.active {
            background: #00d4ff;
            color: #1a1a2e;
        }

        /* Forms and Tables */
        .admin-panel {
            background: rgba(0,212,255,0.1);
            border: 1px solid #00d4ff;
            border-radius: 10px;
            padding: 30px;
            color: #fff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #00d4ff;
            margin-bottom: 5px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid #00d4ff;
            color: #fff;
            border-radius: 5px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .btn {
            padding: 10px 20px;
            background: transparent;
            border: 2px solid #00d4ff;
            color: #fff;
            cursor: pointer;
            border-radius: 5px;
            margin-right: 10px;
        }

        .btn:hover {
            background: #00d4ff;
            color: #1a1a2e;
        }

        .btn-danger {
            border-color: #ff4444;
        }

        .btn-danger:hover {
            background: #ff4444;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            color: #fff;
        }

        .data-table th, .data-table td {
            padding: 10px;
            border: 1px solid #00d4ff;
            text-align: left;
        }

        .data-table th {
            background: rgba(0,212,255,0.2);
            color: #00d4ff;
        }

        /* Student Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .content-card {
            background: rgba(0,212,255,0.1);
            border: 1px solid #00d4ff;
            border-radius: 10px;
            padding: 20px;
            color: #fff;
        }

        .content-card h3 {
            color: #00d4ff;
            margin-bottom: 15px;
            border-bottom: 1px solid #00d4ff;
            padding-bottom: 10px;
        }

        .subject-item {
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 5px;
        }

        .subject-item h4 {
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .topic-list {
            list-style: none;
            padding-left: 0;
        }

        .topic-list li {
            padding: 5px 0;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .marks {
            color: #00d4ff;
            font-weight: bold;
        }

        .resource-links {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .resource-link {
            color: #00d4ff;
            text-decoration: none;
            padding: 5px 10px;
            border: 1px solid #00d4ff;
            border-radius: 3px;
            font-size: 12px;
        }

        .paper-item {
            background: rgba(0,212,255,0.1);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid #00d4ff;
        }

        .download-link {
            color: #00d4ff;
            text-decoration: none;
            display: inline-block;
            padding: 5px 10px;
            border: 1px solid #00d4ff;
            border-radius: 3px;
        }

        .topic-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        .topic-item input {
            flex: 1;
        }

        .remove-btn {
            color: #ff4444;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <div>
                <h2><i class="fa-solid fa-graduation-cap"></i> Government Polytechnic College Asthawa, Nalanda</h2>
                <p id="userInfo">Loading...</p>
            </div>
            <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-sign-out-alt"></i> Logout</button>
        </div>

        <!-- Content will be loaded here based on user type -->
        <div id="dashboardContent"></div>
    </div>

    <div class="footer">
        <p>Made with ❤️ by <a href="#" target="_blank">suraj.AI</a></p>
    </div>

    <script>
        // Firebase Configuration - Your exact config
        const firebaseConfig = {
            apiKey: "AIzaSyDkbbYdIMlEgCQlR0Pf1dBA1F_KVOFWZcA",
            authDomain: "schoolsurajai.firebaseapp.com",
            databaseURL: "https://schoolsurajai-default-rtdb.firebaseio.com",
            projectId: "schoolsurajai",
            storageBucket: "schoolsurajai.firebasestorage.app",
            messagingSenderId: "413213207096",
            appId: "1:413213207096:web:5c0c2742e3150c8bd154cd"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Check user type
        const userType = localStorage.getItem('userType');
        const currentStudent = JSON.parse(localStorage.getItem('currentStudent'));

        if (!userType) {
            window.location.href = 'index.html';
        }

        // Update user info
        if (userType === 'admin') {
            document.getElementById('userInfo').innerHTML = '<i class="fa-solid fa-user-shield"></i> Admin Dashboard';
            loadAdminDashboard();
        } else {
            document.getElementById('userInfo').innerHTML = `<i class="fa-solid fa-user"></i> ${currentStudent.name} - ${currentStudent.branch}`;
            loadStudentDashboard(currentStudent.branch);
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // ==================== ADMIN DASHBOARD ====================
        function loadAdminDashboard() {
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="admin-tabs">
                    <button class="admin-tab active" onclick="showAdminPanel('syllabus')"><i class="fa-solid fa-book"></i> Syllabus</button>
                    <button class="admin-tab" onclick="showAdminPanel('papers')"><i class="fa-solid fa-clock-rotate-left"></i> Previous Papers</button>
                    <button class="admin-tab" onclick="showAdminPanel('students')"><i class="fa-solid fa-users"></i> Students</button>
                </div>
                <div id="adminPanel"></div>
            `;
            showAdminPanel('syllabus');
        }

        function showAdminPanel(panel) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            if (panel === 'syllabus') {
                showSyllabusPanel();
            } else if (panel === 'papers') {
                showPapersPanel();
            } else if (panel === 'students') {
                showStudentsPanel();
            }
        }

        function showSyllabusPanel() {
            const panel = document.getElementById('adminPanel');
            panel.innerHTML = `
                <div class="admin-panel">
                    <h3><i class="fa-solid fa-book"></i> Add/Edit Syllabus</h3>
                    <form id="syllabusForm">
                        <div class="form-group">
                            <label>Select Branch:</label>
                            <select id="syllabusBranch" required>
                                <option value="">Select Branch</option>
                                <option value="Computer Science">Computer Science</option>
                                <option value="Electrical Engineering">Electrical Engineering</option>
                                <option value="Mechanical Engineering">Mechanical Engineering</option>
                                <option value="Civil Engineering">Civil Engineering</option>
                                <option value="Electronics Engineering">Electronics Engineering</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Subject Name:</label>
                            <input type="text" id="subjectName" required placeholder="e.g., Mathematics">
                        </div>
                        <div class="form-group">
                            <label>Topics (with marks):</label>
                            <div id="topicsContainer">
                                <div class="topic-item">
                                    <input type="text" placeholder="Topic name" class="topicName" required>
                                    <input type="number" placeholder="Marks" class="topicMarks" required min="1" max="100">
                                    <i class="fa-solid fa-plus" onclick="addTopic()" style="color: #00d4ff; cursor: pointer;"></i>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Resources:</label>
                            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                                <input type="url" id="videoUrl" placeholder="Video URL" style="flex:1;">
                                <input type="url" id="notesUrl" placeholder="Notes URL" style="flex:1;">
                                <input type="url" id="pdfUrl" placeholder="PDF URL" style="flex:1;">
                            </div>
                        </div>
                        <button type="submit" class="btn"><i class="fa-solid fa-save"></i> Save Syllabus</button>
                    </form>

                    <h4 style="margin-top: 30px;">Existing Syllabus</h4>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Branch</th>
                                <th>Subject</th>
                                <th>Topics</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="syllabusList"></tbody>
                    </table>
                </div>
            `;
            loadSyllabusList();

            // Syllabus form submission
            document.getElementById('syllabusForm').addEventListener('submit', (e) => {
                e.preventDefault();
                saveSyllabus();
            });
        }

        function addTopic() {
            const container = document.getElementById('topicsContainer');
            const div = document.createElement('div');
            div.className = 'topic-item';
            div.innerHTML = `
                <input type="text" placeholder="Topic name" class="topicName" required>
                <input type="number" placeholder="Marks" class="topicMarks" required min="1" max="100">
                <i class="fa-solid fa-trash remove-btn" onclick="this.parentElement.remove()"></i>
            `;
            container.appendChild(div);
        }

        function saveSyllabus() {
            const branch = document.getElementById('syllabusBranch').value;
            const subject = document.getElementById('subjectName').value;
            
            const topicItems = document.querySelectorAll('.topic-item');
            const topics = [];
            topicItems.forEach(item => {
                const name = item.querySelector('.topicName').value;
                const marks = item.querySelector('.topicMarks').value;
                if (name && marks) {
                    topics.push({ name, marks: parseInt(marks) });
                }
            });

            const resources = {
                video: document.getElementById('videoUrl').value,
                notes: document.getElementById('notesUrl').value,
                pdf: document.getElementById('pdfUrl').value
            };

            const syllabusData = {
                [subject]: {
                    topics: topics,
                    resources: resources
                }
            };

            database.ref(`syllabus/${branch}`).update(syllabusData)
                .then(() => {
                    alert('Syllabus saved successfully!');
                    showSyllabusPanel();
                });
        }

        function loadSyllabusList() {
            database.ref('syllabus').once('value', snapshot => {
                const data = snapshot.val() || {};
                let html = '';
                for (let branch in data) {
                    for (let subject in data[branch]) {
                        html += `<tr>
                            <td>${branch}</td>
                            <td>${subject}</td>
                            <td>${data[branch][subject].topics ? data[branch][subject].topics.length + ' topics' : '0 topics'}</td>
                            <td>
                                <button class="btn btn-danger" onclick="deleteSyllabus('${branch}', '${subject}')"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>`;
                    }
                }
                document.getElementById('syllabusList').innerHTML = html || '<tr><td colspan="4" style="text-align: center;">No syllabus added</td></tr>';
            });
        }

        function deleteSyllabus(branch, subject) {
            if (confirm('Delete this syllabus?')) {
                database.ref(`syllabus/${branch}/${subject}`).remove()
                    .then(() => {
                        alert('Deleted!');
                        loadSyllabusList();
                    });
            }
        }

        function showPapersPanel() {
            const panel = document.getElementById('adminPanel');
            panel.innerHTML = `
                <div class="admin-panel">
                    <h3><i class="fa-solid fa-clock-rotate-left"></i> Add Previous Year Papers</h3>
                    <form id="paperForm">
                        <div class="form-group">
                            <label>Select Branch:</label>
                            <select id="paperBranch" required>
                                <option value="">Select Branch</option>
                                <option value="Computer Science">Computer Science</option>
                                <option value="Electrical Engineering">Electrical Engineering</option>
                                <option value="Mechanical Engineering">Mechanical Engineering</option>
                                <option value="Civil Engineering">Civil Engineering</option>
                                <option value="Electronics Engineering">Electronics Engineering</option>
                            </select>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Subject:</label>
                                <input type="text" id="paperSubject" required>
                            </div>
                            <div class="form-group">
                                <label>Year:</label>
                                <input type="text" id="paperYear" required placeholder="e.g., 2023">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Paper File URL:</label>
                            <input type="url" id="paperUrl" required placeholder="Google Drive/PDF link">
                        </div>
                        <button type="submit" class="btn"><i class="fa-solid fa-upload"></i> Add Paper</button>
                    </form>

                    <h4 style="margin-top: 30px;">Existing Papers</h4>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Branch</th>
                                <th>Subject</th>
                                <th>Year</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="papersList"></tbody>
                    </table>
                </div>
            `;
            loadPapersList();

            document.getElementById('paperForm').addEventListener('submit', (e) => {
                e.preventDefault();
                savePaper();
            });
        }

        function savePaper() {
            const branch = document.getElementById('paperBranch').value;
            const year = document.getElementById('paperYear').value;
            
            const paperData = {
                subject: document.getElementById('paperSubject').value,
                fileUrl: document.getElementById('paperUrl').value,
                addedOn: new Date().toISOString()
            };

            database.ref(`papers/${branch}/${year}`).set(paperData)
                .then(() => {
                    alert('Paper added successfully!');
                    showPapersPanel();
                });
        }

        function loadPapersList() {
            database.ref('papers').once('value', snapshot => {
                const data = snapshot.val() || {};
                let html = '';
                for (let branch in data) {
                    for (let year in data[branch]) {
                        html += `<tr>
                            <td>${branch}</td>
                            <td>${data[branch][year].subject}</td>
                            <td>${year}</td>
                            <td>
                                <button class="btn btn-danger" onclick="deletePaper('${branch}', '${year}')"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>`;
                    }
                }
                document.getElementById('papersList').innerHTML = html || '<tr><td colspan="4" style="text-align: center;">No papers added</td></tr>';
            });
        }

        function deletePaper(branch, year) {
            if (confirm('Delete this paper?')) {
                database.ref(`papers/${branch}/${year}`).remove()
                    .then(() => {
                        alert('Deleted!');
                        loadPapersList();
                    });
            }
        }

        function showStudentsPanel() {
            const panel = document.getElementById('adminPanel');
            panel.innerHTML = `
                <div class="admin-panel">
                    <h3><i class="fa-solid fa-users"></i> Registered Students</h3>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Branch</th>
                                <th>Roll No</th>
                            </tr>
                        </thead>
                        <tbody id="studentsList"></tbody>
                    </table>
                </div>
            `;

            database.ref('students').once('value', snapshot => {
                const data = snapshot.val() || {};
                let html = '';
                for (let id in data) {
                    html += `<tr>
                        <td>${data[id].name}</td>
                        <td>${data[id].email}</td>
                        <td>${data[id].branch}</td>
                        <td>${data[id].rollNo}</td>
                    </tr>`;
                }
                document.getElementById('studentsList').innerHTML = html || '<tr><td colspan="4" style="text-align: center;">No students</td></tr>';
            });
        }

        // ==================== STUDENT DASHBOARD ====================
        function loadStudentDashboard(studentBranch) {
            const branches = ['Computer Science', 'Electrical Engineering', 'Mechanical Engineering', 'Civil Engineering', 'Electronics Engineering'];
            
            let tabsHtml = '<div class="branch-tabs">';
            branches.forEach(branch => {
                tabsHtml += `<button class="branch-tab ${branch === studentBranch ? 'active' : ''}" onclick="loadBranchContent('${branch}')">${branch}</button>`;
            });
            tabsHtml += '</div><div id="branchContent"></div>';
            
            document.getElementById('dashboardContent').innerHTML = tabsHtml;
            loadBranchContent(studentBranch);
        }

        function loadBranchContent(branch) {
            document.querySelectorAll('.branch-tab').forEach(t => t.classList.remove('active'));
            event?.target.classList.add('active');

            const content = document.getElementById('branchContent');
            
            database.ref(`syllabus/${branch}`).once('value', snapshot => {
                const syllabus = snapshot.val() || {};
                let html = '<div class="content-grid">';
                
                // Subjects
                html += '<div class="content-card"><h3><i class="fa-solid fa-book"></i> Subjects & Syllabus</h3>';
                
                if (Object.keys(syllabus).length === 0) {
                    html += '<p>No syllabus added yet.</p>';
                } else {
                    for (let subject in syllabus) {
                        html += `<div class="subject-item"><h4>${subject}</h4><ul class="topic-list">`;
                        if (syllabus[subject].topics) {
                            syllabus[subject].topics.forEach(topic => {
                                html += `<li><span>${topic.name}</span> <span class="marks">${topic.marks} marks</span></li>`;
                            });
                        }
                        html += `</ul>`;
                        
                        if (syllabus[subject].resources) {
                            html += '<div class="resource-links">';
                            if (syllabus[subject].resources.video) {
                                html += `<a href="${syllabus[subject].resources.video}" target="_blank" class="resource-link"><i class="fa-brands fa-youtube"></i> Video</a>`;
                            }
                            if (syllabus[subject].resources.notes) {
                                html += `<a href="${syllabus[subject].resources.notes}" target="_blank" class="resource-link"><i class="fa-solid fa-file-lines"></i> Notes</a>`;
                            }
                            if (syllabus[subject].resources.pdf) {
                                html += `<a href="${syllabus[subject].resources.pdf}" target="_blank" class="resource-link"><i class="fa-solid fa-file-pdf"></i> PDF</a>`;
                            }
                            html += '</div>';
                        }
                        html += '</div>';
                    }
                }
                html += '</div>';

                // Previous Papers
                html += '<div class="content-card"><h3><i class="fa-solid fa-clock-rotate-left"></i> Previous Year Papers</h3>';
                
                database.ref(`papers/${branch}`).once('value', paperSnapshot => {
                    const papers = paperSnapshot.val() || {};
                    if (Object.keys(papers).length === 0) {
                        html += '<p>No previous papers added yet.</p>';
                    } else {
                        for (let year in papers) {
                            html += `
                                <div class="paper-item">
                                    <h4>${papers[year].subject} - ${year}</h4>
                                    <a href="${papers[year].fileUrl}" target="_blank" class="download-link"><i class="fa-solid fa-download"></i> Download Paper</a>
                                </div>`;
                        }
                    }
                    html += '</div></div>';
                    content.innerHTML = html;
                });
            });
        }
    </script>
</body>
</html>
